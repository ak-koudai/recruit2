<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採用力診断</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#ffffff;
}

.hero{
  position:relative;
  width:100%;
}

.hero img{
  width:100%;
  height:auto;
  display:block;
}

.cta-button{
  background:#ff7a2f;
  color:white;
  border:none;
  padding:20px 0;
  font-size:24px;
  border-radius:12px;
  cursor:pointer;
  width:100%;
  font-weight:bold;
}

.cta-center{
  position:absolute;
  top:65%;
  left:50%;
  transform:translate(-50%,-50%);
  width:70%;
}
</style>
</head>

<body>

<div class="hero">

<img src="images/top_visual.png">

<div class="cta-center">
<form action="https://あなたのRenderURL/diagnosis">
<button class="cta-button">
5分で診断する（無料）
</button>
</form>
</div>

</div>

</body>
</html>
